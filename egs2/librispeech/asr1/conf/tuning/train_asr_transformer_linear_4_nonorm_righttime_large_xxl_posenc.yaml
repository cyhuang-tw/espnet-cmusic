batch_type: unsorted
batch_size: 4
accum_grad: 1
max_epoch: 80
patience: none
# The initialization method for model parameters
init: xavier_uniform
best_model_criterion:
-   - valid
    - acc
    - max
keep_nbest_models: 100
use_amp: true
preprocessor: music
num_att_plot: 0
num_workers: 24
grad_clip: 1.0
num_iters_per_epoch: 5000
seed: 70

frontend_conf:
    fs: 16000
    n_fft: 2048
    hop_length: 128
    n_mels: 512

encoder: transformer
encoder_conf:
    output_size: 768
    attention_heads: 8
    linear_units: 3072 
    num_blocks: 16
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.1
    input_layer: linear
    normalize_before: true

decoder: transformer
decoder_conf:
    attention_heads: 8
    linear_units: 3072
    num_blocks: 16
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.0
    src_attention_dropout_rate: 0.0

model_conf:
    ctc_weight: 0.0
    lsm_weight: 0.0
    length_normalized_loss: true

optim: adam
optim_conf:
    lr: 0.0001
    foreach: false
    fused: true
scheduler: tristagelr
scheduler_conf:
    max_steps: 400000
    warmup_ratio: 0.0
    hold_ratio: 0.0
    decay_ratio: 1.0

specaug: null
normalize: null

