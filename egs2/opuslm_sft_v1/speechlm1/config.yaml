encoder_decoder_format: false
speaker_prompt_length: 500
pad_speaker_prompt: true
init: null
reflm: null
use_preprocessor: true
subword_choice: huggingface
subword_model: allenai/OLMo-2-1124-7B
non_linguistic_symbols: null
cleaner: null
g2p: g2p_en
codec_token_per_frame: 9
codec_token_in_use: 9
loss_region: target
modality_weights:
    g2p: 1.0
    ssl: 0.5
    codec: 0.0625
    text_bpe: 1.0
    special_token: 10.0
asr_apply_time_mask: true
asr_time_mask_config:
    mask_width_ratio_range:
    - 0.0
    - 0.05
    num_mask: 10
ce_loss_use_liger_kernel: false
transformer: huggingface
transformer_conf:
    hf_model_tag: allenai/OLMo-2-1124-7B
    activation_checkpointing: true
    n_ctx: 8192
corelm: ar_delay
corelm_conf:
    share_emb: false
tokenizer: null
tokenizer_conf: {}
model: espnet
model_conf: {}
required:
- output_dir
- token_list
- token_bias
version: '202402'
distributed: true
ds_config_dict:
    train_micro_batch_size_per_gpu: 1
    gradient_accumulation_steps: 1
    gradient_clipping: 1.0
    bf16:
        enabled: true
    optimizer:
        type: Adam
        params:
            lr: 4.0e-05
            betas:
            - 0.9
            - 0.95
            eps: 1.0e-08
            weight_decay: 3.0e-07
            adam_w_mode: true
    zero_optimization:
        stage: 1
        allgather_partitions: true
        allgather_bucket_size: 1000000000
        reduce_scatter: true
        reduce_bucket_size: 1000000000
        overlap_comm: true
        contiguous_gradients: true
    activation_checkpointing:
        partition_activations: false
        cpu_checkpointing: false
        contiguous_memory_optimization: true
        number_checkpoints: null
        synchronize_checkpoint_boundary: false
        profile: false
    scheduler:
        type: WarmupDecayLR
        params:
            warmup_type: linear
            total_num_steps: 510000
            warmup_num_steps: 500000
            warmup_max_lr: 4.5e-05
            warmup_min_lr: 0
    wall_clock_breakdown: false
    steps_per_print: 1000
