encoder: whisper
encoder_conf:
    whisper_model: large-v3-turbo
    dropout_rate: 0.0
    do_pad_trim: true

decoder: whisper
decoder_conf:
    whisper_model: large-v3-turbo
    load_origin_token_embedding: true

model: sot_whisper
model_conf:
    ctc_weight: 0.0
    use_uppercase_loss: true
    sym_sos: "<|startoftranscript|>"
    sym_eos: "<|endoftext|>"

frontend: null
input_size: 1    # prevents build_model() from instantiating null frontend
specaug: null
normalize: null

preprocessor: sot_whisper
preprocessor_conf:
    whisper_language: en
    whisper_task: transcribe
    added_tokens_txt: local/added_tokens.txt
    whisper_model: large-v3-turbo

max_epoch: 40
optim: adamw
optim_conf:
    lr: 0.00005
    weight_decay: 0.01

scheduler: warmuplr
scheduler_conf:
    warmup_steps: 500

batch_type: numel
batch_bins: 2000000
accum_grad: 4
grad_clip: 1.0
patience: null
best_model_criterion:
    - - valid
      - loss
      - min
